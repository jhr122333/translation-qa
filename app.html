<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Translation QA — 앱</title>
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/layout.css">
  <link rel="stylesheet" href="css/components.css">
</head>
<body>

  <!-- 앱 헤더 -->
  <header class="app-header">
    <div class="container app-header-inner">
      <a href="index.html" class="app-logo">
        Translation<span>QA</span>
        <span class="app-logo-badge">LS EDITION</span>
      </a>
      <div class="api-key-group">
        <label for="apiKeyInput">API Key</label>
        <input type="text" id="apiKeyInput" placeholder="sk-ant-..." autocomplete="off">
        <button id="saveKeyBtn" class="btn btn-sm"
          style="background:var(--color-primary-light);color:var(--color-primary);font-weight:600;flex-shrink:0;">
          저장
        </button>
      </div>
    </div>
  </header>

  <!-- 탭 네비 -->
  <nav class="tabs-nav">
    <div class="container tabs-nav-inner">
      <button class="tab-btn active" data-tab="tab-translate">번역</button>
      <button class="tab-btn" data-tab="tab-qa">QA 평가</button>
      <button class="tab-btn" data-tab="tab-glossary">용어집</button>
      <button class="tab-btn" data-tab="tab-samples">샘플 데모</button>
    </div>
  </nav>

  <!-- ══════════════════════════════════════════════
       탭 1: 번역
  ══════════════════════════════════════════════ -->
  <div class="tab-content active" id="tab-translate">
    <div class="container">
      <div class="two-col">

        <!-- 왼쪽: 입력 -->
        <div class="card">
          <div class="panel-title">번역 입력</div>

          <div class="form-group">
            <div class="form-label">번역 방향</div>
            <div class="direction-toggle">
              <button class="toggle-btn active" data-dir="ko→en">한 → 영</button>
              <button class="toggle-btn" data-dir="en→ko">영 → 한</button>
            </div>
          </div>

          <div class="form-group">
            <label class="form-label" for="translateSource">원문</label>
            <textarea class="form-textarea" id="translateSource" rows="8"
              placeholder="번역할 원문을 입력하세요..."></textarea>
            <div class="char-count"><span id="translateCharCount">0자</span></div>
          </div>

          <div class="tooltip-wrap">
            <button class="btn btn-primary btn-full" id="translateBtn" disabled>번역 실행</button>
            <span class="tooltip" id="translateTip">API Key를 먼저 입력해 주세요.</span>
          </div>
        </div>

        <!-- 오른쪽: 결과 -->
        <div class="card" id="translateResultPanel">
          <div class="result-empty">
            <div class="result-empty-icon">🔤</div>
            <p>번역 결과가 여기에 표시됩니다</p>
          </div>
        </div>

      </div>
    </div>
  </div>

  <!-- ══════════════════════════════════════════════
       탭 2: QA 평가
  ══════════════════════════════════════════════ -->
  <div class="tab-content" id="tab-qa">
    <div class="container">
      <div class="two-col">

        <!-- 왼쪽: 입력 -->
        <div class="card">
          <div class="panel-title">평가 입력</div>

          <div class="info-box">
            💡 번역 탭에서 <strong>📊 QA 평가하기</strong> 버튼을 누르면 자동으로 채워집니다.
          </div>

          <div class="form-group">
            <div class="form-label">번역 방향</div>
            <div class="direction-toggle">
              <button class="toggle-btn active" data-dir="ko→en">한 → 영</button>
              <button class="toggle-btn" data-dir="en→ko">영 → 한</button>
            </div>
          </div>

          <div class="form-group">
            <label class="form-label" for="qaSource">원문</label>
            <textarea class="form-textarea" id="qaSource" rows="5"
              placeholder="원문을 입력하세요..."></textarea>
          </div>

          <div class="form-group">
            <label class="form-label" for="qaTarget">번역문</label>
            <textarea class="form-textarea" id="qaTarget" rows="5"
              placeholder="평가할 번역문을 입력하세요..."></textarea>
          </div>

          <div class="tooltip-wrap">
            <button class="btn btn-primary btn-full" id="qaBtn" disabled>평가 시작</button>
            <span class="tooltip" id="qaTip">API Key를 먼저 입력해 주세요.</span>
          </div>
        </div>

        <!-- 오른쪽: 결과 -->
        <div class="card" id="qaResultPanel">
          <div class="result-empty">
            <div class="result-empty-icon">📊</div>
            <p>평가 결과가 여기에 표시됩니다</p>
          </div>
        </div>

      </div>
    </div>
  </div>

  <!-- ══════════════════════════════════════════════
       탭 3: 용어집
  ══════════════════════════════════════════════ -->
  <div class="tab-content" id="tab-glossary">
    <div class="container">
      <div class="glossary-layout">

        <!-- 툴바 -->
        <div class="glossary-toolbar">
          <div class="cat-filters" id="catFilters">
            <button class="cat-btn active" data-cat="전체">전체</button>
            <button class="cat-btn" data-cat="GMP/Quality">GMP/Quality</button>
            <button class="cat-btn" data-cat="Clinical Trial">Clinical Trial</button>
            <button class="cat-btn" data-cat="Regulatory">Regulatory</button>
            <button class="cat-btn" data-cat="Pharmacovigilance">Pharmacovigilance</button>
            <button class="cat-btn" data-cat="사용자 정의">사용자 정의</button>
          </div>
          <input class="search-input" type="text" id="glossarySearch" placeholder="용어 검색...">
          <span class="glossary-count" id="glossaryCount"></span>
        </div>

        <!-- 테이블 -->
        <div class="glossary-table-wrap">
          <table class="glossary-table">
            <thead>
              <tr>
                <th>카테고리</th><th>한국어</th><th>영어</th><th>약어</th><th>삭제</th>
              </tr>
            </thead>
            <tbody id="glossaryTbody"></tbody>
          </table>
        </div>

        <!-- 추가 폼 -->
        <div class="add-term-form">
          <div class="add-term-title">용어 추가</div>
          <div class="add-term-grid">
            <div class="form-group" style="margin:0">
              <label class="form-label" for="newCategory">카테고리</label>
              <select class="form-select" id="newCategory">
                <option value="GMP/Quality">GMP/Quality</option>
                <option value="Clinical Trial">Clinical Trial</option>
                <option value="Regulatory">Regulatory</option>
                <option value="Pharmacovigilance">Pharmacovigilance</option>
                <option value="사용자 정의">사용자 정의</option>
              </select>
            </div>
            <div class="form-group" style="margin:0">
              <label class="form-label" for="newKo">한국어</label>
              <input class="form-input" type="text" id="newKo" placeholder="한국어 용어">
            </div>
            <div class="form-group" style="margin:0">
              <label class="form-label" for="newEn">영어</label>
              <input class="form-input" type="text" id="newEn" placeholder="English term">
            </div>
            <div class="form-group" style="margin:0">
              <label class="form-label" for="newAbbr">약어</label>
              <input class="form-input" type="text" id="newAbbr" placeholder="Abbr.">
            </div>
            <div style="display:flex;align-items:flex-end;">
              <button class="btn btn-primary" id="addTermBtn">+ 추가</button>
            </div>
          </div>
        </div>

      </div>
    </div>
  </div>

  <!-- ══════════════════════════════════════════════
       탭 4: 샘플 데모
  ══════════════════════════════════════════════ -->
  <div class="tab-content" id="tab-samples">
    <div class="container">
      <div class="samples-layout">
        <div class="samples-header">
          <h2>샘플 데모</h2>
          <p style="color:var(--color-text-secondary);font-size:.9375rem;margin-top:.4rem;">
            샘플을 선택해 번역 또는 QA 평가를 바로 실행해보세요
          </p>
        </div>
        <div class="samples-grid" id="samplesGrid"></div>
      </div>
    </div>
  </div>

  <!-- 푸터 -->
  <footer class="footer">
    <div class="container">
      Translation QA — Life Sciences Edition &nbsp;|&nbsp; AX Portfolio Demo
    </div>
  </footer>

  <script type="module" src="js/app.js"></script>
</body>
</html>
